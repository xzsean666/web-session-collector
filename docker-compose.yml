services:
  xiaohongshu-api:
    build:
      context: .
    shm_size: "2gb"
    ports:
      - "0.0.0.0:${APP_API_PORT:-10085}:${APP_API_PORT:-10085}"
      - "0.0.0.0:${ACTIVE_NOVNC_PORT:-10086}:${ACTIVE_NOVNC_PORT:-10086}"
      - "0.0.0.0:${IDLE_NOVNC_PORT:-10087}:${IDLE_NOVNC_PORT:-10087}"
    environment:
      VNC_PASSWORD: "${VNC_PASSWORD:-}"
      ACTIVE_DISPLAY: "${ACTIVE_DISPLAY:-:99}"
      IDLE_DISPLAY: "${IDLE_DISPLAY:-:100}"
      ACTIVE_VNC_PORT: "${ACTIVE_VNC_PORT:-5900}"
      IDLE_VNC_PORT: "${IDLE_VNC_PORT:-5901}"
      ACTIVE_NOVNC_PORT: "${ACTIVE_NOVNC_PORT:-10086}"
      IDLE_NOVNC_PORT: "${IDLE_NOVNC_PORT:-10087}"
      APP_IDLE_NOVNC_SWITCH: "${APP_IDLE_NOVNC_SWITCH:-true}"
      APP_ACTIVE_DISPLAY: "${ACTIVE_DISPLAY:-:99}"
      APP_IDLE_DISPLAY: "${IDLE_DISPLAY:-:100}"
      APP_SITE: xiaohongshu
      APP_USER_DATA_DIR: /data/chrome-user-data
      APP_PROFILE_NAME: docker-xiaohongshu
      APP_BROWSER_MODE: launch
      APP_HEADLESS: "false"
      # auto = entrypoint 按架构解析(x86→chrome, arm→bundled);也可填具体 channel 强制。
      APP_BROWSER_CHANNEL: auto
      APP_EXECUTABLE_PATH: ""
      APP_PROFILE_DIRECTORY: Default
      APP_LOCALE: zh-CN
      APP_TIMEZONE_ID: Asia/Shanghai
      APP_VIEWPORT_WIDTH: "1366"
      APP_VIEWPORT_HEIGHT: "768"
      APP_DEVICE_SCALE_FACTOR: "1"
      APP_START_URL: https://www.xiaohongshu.com/
      APP_LOG_LEVEL: info
      APP_KEEP_BROWSER_ALIVE: "false"
      APP_INTERACTIVE_LOGIN_ON_MISSING_USER: "false"
      APP_HUMANIZE: "true"
      # 桌面 UA/平台伪装(arm→macOS, x64→Windows)。如发现伪装反招风控可设 "false" 关闭。
      APP_UA_SPOOF: "true"
      APP_STARTUP_SESSION_ID: "${APP_STARTUP_SESSION_ID:-default}"
      APP_STARTUP_IDLE_SESSION_ID: "${APP_STARTUP_IDLE_SESSION_ID:-}"
      APP_BROWSER_FLAGS: '["--no-first-run","--no-default-browser-check","--disable-dev-shm-usage","--no-sandbox"]'
      APP_IGNORE_DEFAULT_ARGS: "[]"
      APP_API_HOST: 0.0.0.0
      APP_API_PORT: "${APP_API_PORT:-10085}"
      APP_ACCOUNT_CHECK_INTERVAL_MS: "60000"
      APP_SEARCH_RECENT_DAYS: "30"
      APP_SEARCH_LIMIT: "30"
      APP_SEARCH_SCROLLS: "8"
    volumes:
      - chrome-user-data:/data/chrome-user-data
    restart: unless-stopped

volumes:
  chrome-user-data:
